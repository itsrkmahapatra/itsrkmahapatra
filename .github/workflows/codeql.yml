name: CodeQL
on:
  schedule:
    - cron: '0 0 * * 0'
  push:
    branches: [ main ]
jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: github/codeql-action/init@v4
        with: { languages: ['javascript'] }
      - uses: github/codeql-action/autobuild@v4
      - uses: github/codeql-action/analyze@v4
